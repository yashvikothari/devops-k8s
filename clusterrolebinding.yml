apiVersion: rbac.authorization.k8s.io/v1
# This cluster role binding allows yashvi user to read pods in any namespace.
kind: ClusterRoleBinding
metadata:
  name: read-pods-global
subjects:
- kind: User
  name: yashvi # Name is case sensitive
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: pod-reader-clusterrole
  apiGroup: rbac.authorization.k8s.io


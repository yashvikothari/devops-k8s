apiVersion: rbac.authorization.k8s.io/v1
# This role binding allows "yashvi" to read pods in the "dev" namespace.
# You need to already have a ClusterRole named "pod-reader-clusterrole".
kind: RoleBinding
metadata:
  name: read-pods
  #
  # The namespace of the RoleBinding determines where the permissions are granted.
  # This only grants permissions within the "development" namespace.
  namespace: dev
subjects:
- kind: User
  name: yashvi # Name is case sensitive
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: pod-reader-clusterrole
  apiGroup: rbac.authorization.k8s.io


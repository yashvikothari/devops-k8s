apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - image: mysql:5.7
        name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: Root@123
        - name: MYSQL_USER
          value: yashvi
        - name: MYSQL_PASSWORD
          value: Redhat@123
        ports:
        - containerPort: 3306
          name: mysql
